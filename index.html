<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理化学 · 结构化知识库</title>
  
  <!-- MathJax 3 配置 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true,
        packages: {'[+]': ['base', 'ams', 'newcommand']}
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      },
      loader: {
        load: ['[tex]/ams', '[tex]/newcommand']
      },
      startup: {
        typeset: true,
        ready: () => {
          MathJax.startup.defaultReady();
          console.log('MathJax 已就绪');
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
  
  <!-- 引入知识库数据 -->
  <script src="knowledge_data.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Roboto', 'Microsoft YaHei', system-ui, sans-serif;
      background: #f5f7fb;
      color: #1e293b;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    header {
      background: linear-gradient(135deg, #0f2b4b 0%, #1e4a6b 100%);
      color: white;
      padding: 1.2rem 2rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    
    header h1 {
      font-weight: 500;
      font-size: 1.8rem;
      letter-spacing: 2px;
    }
    
    .progress-badge {
      background: rgba(255,255,255,0.15);
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-size: 0.95rem;
    }
    
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e2e8f0;
      padding: 1.2rem 0.8rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    
    .chapter-btn {
      text-align: left;
      padding: 1rem 1.2rem;
      background: #f8fafc;
      border: 2px solid #e9eef3;
      border-radius: 12px;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    
    .chapter-btn:hover {
      background: #eef6ff;
      border-color: #0284c7;
      transform: translateX(3px);
    }
    
    .chapter-btn.active {
      background: #0f2b4b;
      color: white;
      border-color: #0f2b4b;
    }
    
    .chapter-btn .count {
      background: rgba(255,255,255,0.2);
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.75rem;
    }
    
    .main-content {
      flex: 1;
      padding: 1.8rem 2rem;
      overflow-y: auto;
      background: #f9fafc;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #edf2f7;
    }
    
    .card h2 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #0f2b4b;
    }
    
    .card h3 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: #1e4a6b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .concept-tag {
      display: inline-block;
      background: #e6f0fb;
      color: #0369a1;
      font-weight: 600;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-right: 0.5rem;
      white-space: nowrap;
    }
    
    .formula-block {
      background: #f1f5f9;
      border-left: 5px solid #0284c7;
      padding: 1rem 1.5rem;
      margin: 0.8rem 0;
      border-radius: 10px;
      font-size: 1.1rem;
      overflow-x: auto;
      white-space: normal;
      word-break: break-word;
    }
    
    .exercise-box {
      background: #fef9e7;
      border: 1px solid #fde68a;
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      margin: 0.8rem 0;
    }
    
    .exercise-box strong {
      color: #92400e;
    }
    
    .solution-toggle {
      background: white;
      border: 2px solid #cbd5e1;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: all 0.2s;
      font-weight: 500;
    }
    
    .solution-toggle:hover {
      background: #e2e8f0;
      border-color: #94a3b8;
    }
    
    .solution-content {
      margin-top: 0.8rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 10px;
      display: none;
      border-left: 4px solid #0f2b4b;
      overflow-x: auto;
    }
    
    .solution-content.show {
      display: block;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      margin: 0.6rem 0;
      padding: 0.4rem 0;
    }
    
    .checklist-item input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #0284c7;
      margin-top: 0.2rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    
    .checklist-item label {
      cursor: pointer;
      flex: 1;
    }
    
    .progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      margin: 0.8rem 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0284c7, #0369a1);
      border-radius: 10px;
      transition: width 0.5s ease;
      width: 0%;
    }
    
    .quick-review {
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid #bae6fd;
    }
    
    .content-count {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .loading-spinner {
      text-align: center;
      padding: 3rem;
    }
    
    .loading-spinner::after {
      content: '';
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid #e2e8f0;
      border-top-color: #0284c7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 0.8rem;
        gap: 0.4rem;
        overflow-x: auto;
        border-right: none;
        border-bottom: 1px solid #e2e8f0;
      }
      
      .chapter-btn {
        flex: 1;
        min-width: 120px;
        text-align: center;
        justify-content: center;
        padding: 0.7rem;
        font-size: 0.85rem;
      }
      
      .main-content {
        padding: 1rem;
      }
      
      header {
        padding: 1rem;
      }
      
      header h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚗️ 物理化学 · 知识蒸馏</h1>
    <div class="progress-badge" id="globalProgressDisplay">
      📊 加载中...
    </div>
  </header>
  
  <div class="layout">
    <nav class="sidebar" id="chapterNav">
      <!-- 动态生成 -->
    </nav>

    <main class="main-content" id="mainContent">
      <div class="loading-spinner">
        <p style="color:#64748b; margin-top:1rem;">正在加载知识库...</p>
      </div>
    </main>
  </div>

  <script>
    (function() {
      'use strict';
      
      // ========== 数据验证 ==========
      if (typeof knowledgeBase === 'undefined') {
        document.getElementById('mainContent').innerHTML = `
          <div class="card" style="text-align:center; padding:3rem;">
            <h2>❌ 数据加载失败</h2>
            <p style="color:#ef4444;">未找到 knowledge_data.js 文件</p>
            <p style="color:#64748b;">请运行: python convert_knowledge.py</p>
          </div>`;
        return;
      }
      
      // ========== 公式预处理 ==========
      function preprocessFormula(formula) {
        if (!formula) return '';
        
        // 确保公式被 $ 包围
        let processed = formula.trim();
        
        // 如果公式中没有 $ 符号，自动添加
        if (!processed.includes('$')) {
          // 检查是否包含LaTeX命令
          if (processed.includes('\\') || processed.includes('_') || processed.includes('^') || processed.includes('{')) {
            processed = `$${processed}$`;
          }
        }
        
        // 修复常见问题
        processed = processed
          .replace(/\$\$/g, '$')  // 避免双$嵌套
          .replace(/\s*\$\s*/g, '$')  // 移除$周围的空格
          .trim();
        
        // 确保成对的$
        const dollarCount = (processed.match(/\$/g) || []).length;
        if (dollarCount % 2 !== 0) {
          processed += '$';
        }
        
        return processed;
      }
      
      function preprocessText(text) {
        if (!text) return '';
        
        // 保护已有的LaTeX公式
        let processed = text;
        
        // 检测并保护 $\frac{...}$ 等公式
        processed = processed.replace(/\$/g, ' $ ');
        
        return processed;
      }
      
      // ========== 状态管理 ==========
      let currentChapter = Object.keys(knowledgeBase)[0] || null;
      const STORAGE_KEY = 'physchem_learning_progress_v3';
      
      function getProgress() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          return stored ? JSON.parse(stored) : {};
        } catch (e) {
          console.warn('读取进度失败:', e);
          return {};
        }
      }
      
      function saveProgress(progress) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        } catch (e) {
          console.warn('保存进度失败:', e);
        }
      }
      
      function initProgress() {
        const progress = getProgress();
        let needsUpdate = false;
        
        for (const chId in knowledgeBase) {
          const chData = knowledgeBase[chId];
          if (!progress[chId]) {
            progress[chId] = {
              concepts: new Array(chData.concepts.length).fill(false),
              exercises: new Array(chData.exercises.length).fill(false),
              checklist: [false, false, false]
            };
            needsUpdate = true;
          } else {
            if (!progress[chId].concepts || progress[chId].concepts.length !== chData.concepts.length) {
              progress[chId].concepts = new Array(chData.concepts.length).fill(false);
              needsUpdate = true;
            }
            if (!progress[chId].exercises || progress[chId].exercises.length !== chData.exercises.length) {
              progress[chId].exercises = new Array(chData.exercises.length).fill(false);
              needsUpdate = true;
            }
            if (!progress[chId].checklist) {
              progress[chId].checklist = [false, false, false];
              needsUpdate = true;
            }
          }
        }
        
        if (needsUpdate) saveProgress(progress);
        return progress;
      }
      
      let progressData = initProgress();
      
      // ========== 进度更新 ==========
      function updateProgress(chapter, type, index, value) {
        if (!progressData[chapter]) return;
        
        if (type === 'concept') {
          progressData[chapter].concepts[index] = value;
        } else if (type === 'exercise') {
          progressData[chapter].exercises[index] = value;
        } else if (type === 'checklist') {
          progressData[chapter].checklist[index] = value;
        }
        
        saveProgress(progressData);
        updateGlobalProgress();
        updateChapterProgress(chapter);
      }
      
      function updateGlobalProgress() {
        let total = 0, completed = 0;
        
        for (const chId in progressData) {
          const p = progressData[chId];
          if (p.concepts) p.concepts.forEach(v => { total++; if(v) completed++; });
          if (p.exercises) p.exercises.forEach(v => { total++; if(v) completed++; });
          if (p.checklist) p.checklist.forEach(v => { total++; if(v) completed++; });
        }
        
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        document.getElementById('globalProgressDisplay').textContent = `📊 整体进度 ${percent}%`;
      }
      
      function updateChapterProgress(chapter) {
        const p = progressData[chapter];
        if (!p) return;
        
        let total = 0, done = 0;
        if (p.concepts) p.concepts.forEach(v => { total++; if(v) done++; });
        if (p.exercises) p.exercises.forEach(v => { total++; if(v) done++; });
        if (p.checklist) p.checklist.forEach(v => { total++; if(v) done++; });
        
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);
        const fillBar = document.getElementById('chapterProgressFill');
        if (fillBar) fillBar.style.width = percent + '%';
      }
      
      // ========== MathJax 渲染辅助 ==========
      function renderMath(element) {
        if (window.MathJax && window.MathJax.typesetPromise) {
          return MathJax.typesetPromise([element]).catch(err => {
            console.warn('MathJax渲染失败:', err);
          });
        }
        return Promise.resolve();
      }
      
      function renderAllMath() {
        if (window.MathJax && window.MathJax.typesetPromise) {
          return MathJax.typesetPromise().catch(err => {
            console.warn('MathJax全局渲染失败:', err);
          });
        }
        return Promise.resolve();
      }
      
      // ========== 渲染函数 ==========
      async function renderChapter(chapterId) {
        const data = knowledgeBase[chapterId];
        if (!data) return;
        
        const chapterProgress = progressData[chapterId] || { concepts: [], exercises: [], checklist: [false, false, false] };
        
        let html = `
          <div class="card">
            <h2>${data.title}</h2>
            <div class="progress-bar">
              <div class="progress-fill" id="chapterProgressFill" style="width:0%"></div>
            </div>
            <div class="content-count">
              <span>📘 ${data.concepts.length}个核心概念</span>
              <span>🧮 ${data.keyFormulas.length}条公式</span>
              <span>✏️ ${data.exercises.length}道习题</span>
            </div>
          </div>
        `;
        
        // 重要概念
        html += '<div class="card"><h3>📌 重要概念</h3>';
        data.concepts.forEach((item, idx) => {
          const checked = chapterProgress.concepts[idx] ? 'checked' : '';
          const conceptId = `concept-${chapterId}-${idx}`;
          const desc = preprocessText(item.desc || '');
          html += `
            <div class="checklist-item">
              <input type="checkbox" id="${conceptId}" ${checked} 
                     onchange="window.handleConceptToggle('${chapterId}', ${idx}, this.checked)">
              <label for="${conceptId}">
                <span class="concept-tag">${item.term || '概念'}</span> 
                <span>${desc}</span>
              </label>
            </div>
          `;
        });
        html += '</div>';
        
        // 核心公式
        html += '<div class="card"><h3>🧮 核心公式</h3>';
        data.keyFormulas.forEach((formula, idx) => {
          const processedFormula = preprocessFormula(formula);
          html += `<div class="formula-block">${processedFormula}</div>`;
        });
        html += '</div>';
        
        // 考前必背提纲
        const topConcepts = data.concepts.slice(0, 5).map(c => c.term).filter(Boolean).join('、');
        html += `
          <div class="card quick-review">
            <h3>📋 考前必背提纲</h3>
            <div class="checklist-item">
              <input type="checkbox" id="checklist-${chapterId}-0" 
                     ${chapterProgress.checklist[0] ? 'checked' : ''}
                     onchange="window.handleChecklistToggle('${chapterId}', 0, this.checked)">
              <label for="checklist-${chapterId}-0">
                ✅ <strong>重点概念：</strong>${topConcepts || '请查看上方概念列表'}
              </label>
            </div>
            <div class="checklist-item">
              <input type="checkbox" id="checklist-${chapterId}-1"
                     ${chapterProgress.checklist[1] ? 'checked' : ''}
                     onchange="window.handleChecklistToggle('${chapterId}', 1, this.checked)">
              <label for="checklist-${chapterId}-1">
                📐 <strong>重要公式：</strong>共${data.keyFormulas.length}条核心公式需熟练掌握
              </label>
            </div>
            <div class="checklist-item">
              <input type="checkbox" id="checklist-${chapterId}-2"
                     ${chapterProgress.checklist[2] ? 'checked' : ''}
                     onchange="window.handleChecklistToggle('${chapterId}', 2, this.checked)">
              <label for="checklist-${chapterId}-2">
                ⚠️ <strong>适用条件：</strong>注意标准态、稀溶液、理想气体、恒温等前提条件
              </label>
            </div>
          </div>
        `;
        
        // 习题
        html += '<div class="card"><h3>✏️ 交互习题</h3>';
        data.exercises.forEach((ex, idx) => {
          const exChecked = chapterProgress.exercises[idx] ? 'checked' : '';
          const exId = `ex-${chapterId}-${idx}`;
          html += `
            <div class="exercise-box">
              <div class="checklist-item">
                <input type="checkbox" id="${exId}" ${exChecked}
                       onchange="window.handleExerciseToggle('${chapterId}', ${idx}, this.checked)">
                <label for="${exId}">
                  <strong>[${ex.type || '题目'}]</strong> ${preprocessText(ex.question || '')}
                </label>
              </div>
          `;
          
          if (ex.options && ex.options.length > 0) {
            html += '<div style="margin-left:2rem; margin-top:0.5rem;">';
            ex.options.forEach(opt => {
              html += `<div>${preprocessText(opt)}</div>`;
            });
            html += '</div>';
          }
          
          html += `
              <button class="solution-toggle" onclick="window.toggleSolution(this, '${chapterId}', ${idx})">
                🔍 显示解答
              </button>
              <div class="solution-content" id="solution-${chapterId}-${idx}">
                <strong>📝 参考解答：</strong><br>${preprocessText(ex.answer || '暂无解答')}
              </div>
            </div>
          `;
        });
        html += '</div>';
        
        document.getElementById('mainContent').innerHTML = html;
        
        // 更新进度条
        setTimeout(() => updateChapterProgress(chapterId), 50);
        
        // 渲染 MathJax（关键修复）
        await renderAllMath();
        
        console.log(`✅ 章节 ${data.title} 渲染完成`);
      }
      
      // ========== 全局函数 ==========
      window.handleConceptToggle = function(chapter, index, checked) {
        updateProgress(chapter, 'concept', index, checked);
      };
      
      window.handleExerciseToggle = function(chapter, index, checked) {
        updateProgress(chapter, 'exercise', index, checked);
      };
      
      window.handleChecklistToggle = function(chapter, index, checked) {
        updateProgress(chapter, 'checklist', index, checked);
      };
      
      window.toggleSolution = async function(btn, chapterId, idx) {
        const solutionId = `solution-${chapterId}-${idx}`;
        const solutionDiv = document.getElementById(solutionId) || btn.nextElementSibling;
        
        if (solutionDiv) {
          const isShowing = solutionDiv.classList.contains('show');
          if (isShowing) {
            solutionDiv.classList.remove('show');
            btn.textContent = '🔍 显示解答';
          } else {
            solutionDiv.classList.add('show');
            btn.textContent = '🔒 收起解答';
            
            // 渲染解答中的公式
            await renderMath(solutionDiv);
          }
        }
      };
      
      // ========== 导航设置 ==========
      function setupNavigation() {
        const nav = document.getElementById('chapterNav');
        if (!nav) return;
        
        nav.innerHTML = '';
        const chapterIcons = {
          electrochemistry: '🔋',
          kinetics: '⚡',
          surface: '🌊',
          colloid: '🧴'
        };
        
        for (const chId in knowledgeBase) {
          const data = knowledgeBase[chId];
          const icon = chapterIcons[chId] || '📚';
          const totalItems = data.concepts.length + data.keyFormulas.length + data.exercises.length;
          
          const btn = document.createElement('button');
          btn.className = 'chapter-btn';
          btn.dataset.chapter = chId;
          btn.innerHTML = `${icon} ${data.title} <span class="count">${totalItems}</span>`;
          
          if (chId === currentChapter) {
            btn.classList.add('active');
          }
          
          btn.addEventListener('click', function() {
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentChapter = this.dataset.chapter;
            renderChapter(currentChapter);
          });
          
          nav.appendChild(btn);
        }
      }
      
      // ========== 初始化 ==========
      async function init() {
        console.log('🚀 初始化物理化学知识库...');
        console.log('MathJax状态:', typeof MathJax !== 'undefined' ? '已加载' : '未加载');
        console.log('知识库章节:', Object.keys(knowledgeBase));
        
        if (Object.keys(knowledgeBase).length === 0) {
          document.getElementById('mainContent').innerHTML = `
            <div class="card" style="text-align:center; padding:3rem;">
              <h2>❌ 知识库为空</h2>
              <p>请检查 knowledge_data.js 文件内容</p>
            </div>`;
          return;
        }
        
        setupNavigation();
        
        if (currentChapter) {
          await renderChapter(currentChapter);
        }
        
        updateGlobalProgress();
        
        console.log('✅ 初始化完成');
      }
      
      // 等待 MathJax 加载
      function waitForMathJax() {
        return new Promise((resolve) => {
          if (window.MathJax && window.MathJax.typesetPromise) {
            resolve();
          } else {
            const checkInterval = setInterval(() => {
              if (window.MathJax && window.MathJax.typesetPromise) {
                clearInterval(checkInterval);
                resolve();
              }
            }, 100);
            
            // 超时处理
            setTimeout(() => {
              clearInterval(checkInterval);
              console.warn('MathJax加载超时，继续初始化...');
              resolve();
            }, 10000);
          }
        });
      }
      
      // 启动
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', async () => {
          await waitForMathJax();
          init();
        });
      } else {
        waitForMathJax().then(() => init());
      }
      
    })();
  </script>
</body>
</html>
